<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PegaBao - Booking Confirmation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#522d19",
                    "on-primary-fixed": "#311303",
                    "on-secondary-fixed-variant": "#663e00",
                    "tertiary-fixed": "#dde1ff",
                    "surface-container": "#efedec",
                    "error": "#ba1a1a",
                    "tertiary-container": "#989ebe",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#f4ba9e",
                    "primary": "#80543d",
                    "surface-tint": "#80543d",
                    "primary-fixed-dim": "#f4ba9e",
                    "surface-dim": "#dbdad8",
                    "on-secondary-container": "#744600",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#2f3550",
                    "tertiary": "#575d7a",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#fbf9f7",
                    "on-secondary-fixed": "#2b1700",
                    "on-tertiary": "#ffffff",
                    "secondary-container": "#fdb65f",
                    "inverse-surface": "#30302f",
                    "surface-bright": "#fbf9f7",
                    "surface-variant": "#e4e2e0",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#f2f0ee",
                    "secondary-fixed": "#ffddb9",
                    "primary-fixed": "#ffdbcb",
                    "secondary": "#875300",
                    "on-surface": "#1b1c1b",
                    "outline-variant": "#d6c3bb",
                    "surface-container-highest": "#e4e2e0",
                    "on-tertiary-fixed": "#141a33",
                    "on-surface-variant": "#51443e",
                    "background": "#fbf9f7",
                    "primary-container": "#c99379",
                    "on-primary-fixed-variant": "#653d28",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#ffb964",
                    "on-background": "#1b1c1b",
                    "outline": "#83746d",
                    "surface-container-low": "#f5f3f1",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#bfc5e6",
                    "on-tertiary-fixed-variant": "#3f4561",
                    "surface-container-high": "#eae8e6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-desktop": "32px",
                    "stack-sm": "12px",
                    "stack-md": "24px",
                    "margin-mobile": "16px",
                    "base": "8px",
                    "touch-target-min": "48px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "cta": ["Inter"],
                    "label-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "cta": ["18px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col">
<!-- Top App Bar (Transactional variant - Nav suppressed) -->
<header class="bg-surface w-full top-0 sticky border-b border-outline-variant/20 flex justify-between items-center px-margin-mobile py-base h-[64px] z-50">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="text-on-surface-variant hover:bg-surface-container-high active:scale-95 duration-100 p-2 rounded-full flex items-center justify-center min-h-[48px] min-w-[48px]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Confirm Booking</h1>
</div>
</header>
<main class="flex-grow pb-safe px-margin-mobile md:px-margin-desktop py-stack-md max-w-2xl mx-auto w-full">
<!-- Progress Bar -->
<div class="mb-stack-md">
<div class="flex justify-between items-center mb-2">
<span class="font-label-lg text-label-lg text-on-surface-variant">Details</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Schedule</span>
<span class="font-label-lg text-label-lg text-primary">Confirm</span>
</div>
<div class="flex items-center w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary w-full"></div>
</div>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg mb-stack-sm text-on-surface">Review Details</h2>
<!-- Job Summary Card -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-lg p-margin-mobile mb-stack-md shadow-sm">
<div class="flex items-start gap-4 mb-stack-sm">
<div class="bg-secondary-container text-on-secondary-container p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">plumbing</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Pipe Leak Repair</h3>
<div class="flex items-center gap-2 mt-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<p class="font-body-md text-body-md">123 Sampaguita St., QC</p>
</div>
</div>
</div>
<hr class="border-outline-variant/20 my-stack-sm"/>
<div class="flex items-start gap-4 mb-stack-sm">
<div class="text-on-surface-variant p-1">
<span class="material-symbols-outlined">event</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-surface-variant mb-1">SCHEDULED FOR</p>
<p class="font-body-lg text-body-lg font-semibold text-on-surface">Tomorrow, Oct 25 at 2:00 PM</p>
</div>
</div>
<div class="flex items-start gap-4">
<div class="text-on-surface-variant p-1">
<span class="material-symbols-outlined">payments</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-surface-variant mb-1">PRICE ESTIMATE</p>
<p class="font-body-lg text-body-lg font-semibold text-on-surface">₱500 - ₱700</p>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-1">(to be confirmed after inspection)</p>
</div>
</div>
</div>
<!-- Message Box -->
<div class="mb-stack-md">
<label class="block font-label-lg text-label-lg text-on-surface mb-2" for="message">Message to worker (Optional)</label>
<textarea class="w-full bg-surface-container-lowest border-2 border-outline focus:border-secondary focus:ring-0 rounded-DEFAULT p-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 min-h-[48px]" id="message" placeholder="E.g., The leak is under the kitchen sink. Please text before arriving." rows="3"></textarea>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant/20 p-margin-mobile pb-safe z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary text-on-primary font-cta text-cta h-touch-target-min rounded-DEFAULT flex items-center justify-center active:scale-95 transition-transform">
                Confirm Booking
            </button>
</div>
</div>
</body></html>
