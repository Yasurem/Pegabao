<!-- Micro-interaction Script for Stars -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('.star-btn');
            const ratingLabel = document.getElementById('rating-label');
            const labels = ["Needs Improvement", "Fair", "Good", "Very Good", "Excellent work!"];
            let currentRating = 0;

            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    const rating = parseInt(e.currentTarget.getAttribute('data-rating'));
                    currentRating = rating;
                    
                    // Update star visuals
                    stars.forEach((s, index) => {
                        const icon = s.querySelector('span');
                        if (index < rating) {
                            icon.classList.add('fill', 'text-secondary-container');
                            icon.classList.remove('text-outline-variant');
                            // Add a tiny bounce animation
                            icon.style.transform = 'scale(1.2)';
                            setTimeout(() => { icon.style.transform = 'scale(1)'; }, 150);
                        } else {
                            icon.classList.remove('fill', 'text-secondary-container');
                            icon.classList.add('text-outline-variant');
                        }
                    });

                    // Update label
                    ratingLabel.textContent = labels[rating - 1];
                    ratingLabel.classList.remove('opacity-0');
                    ratingLabel.classList.add('opacity-100');
                });
            });
        });
    </script>
