<!DOCTYPE html>

<html lang="tl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PegaBao - Handa ka na!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "surface-container": "#efedec",
                "primary": "#80543d",
                "outline-variant": "#d6c3bb",
                "surface-container-highest": "#e4e2e0",
                "surface-container-low": "#f5f3f1",
                "on-background": "#1b1c1b",
                "on-tertiary-fixed": "#141a33",
                "on-secondary-fixed-variant": "#663e00",
                "surface-dim": "#dbdad8",
                "inverse-surface": "#30302f",
                "tertiary-fixed": "#dde1ff",
                "secondary-fixed": "#ffddb9",
                "on-secondary": "#ffffff",
                "primary-container": "#c99379",
                "on-secondary-container": "#744600",
                "primary-fixed-dim": "#f4ba9e",
                "outline": "#83746d",
                "tertiary-container": "#989ebe",
                "inverse-primary": "#f4ba9e",
                "tertiary-fixed-dim": "#bfc5e6",
                "on-tertiary-fixed-variant": "#3f4561",
                "secondary-fixed-dim": "#ffb964",
                "on-tertiary-container": "#2f3550",
                "inverse-on-surface": "#f2f0ee",
                "on-primary-fixed": "#311303",
                "on-error-container": "#93000a",
                "surface-bright": "#fbf9f7",
                "surface-tint": "#80543d",
                "on-error": "#ffffff",
                "on-primary-fixed-variant": "#653d28",
                "on-secondary-fixed": "#2b1700",
                "on-tertiary": "#ffffff",
                "background": "#fbf9f7",
                "surface": "#fbf9f7",
                "tertiary": "#575d7a",
                "primary-fixed": "#ffdbcb",
                "on-surface-variant": "#51443e",
                "on-surface": "#1b1c1b",
                "error-container": "#ffdad6",
                "secondary": "#875300",
                "surface-container-lowest": "#ffffff",
                "surface-variant": "#e4e2e0",
                "on-primary": "#ffffff",
                "secondary-container": "#fdb65f",
                "surface-container-high": "#eae8e6",
                "error": "#ba1a1a",
                "on-primary-container": "#522d19"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "touch-target-min": "48px",
                "stack-sm": "12px",
                "gutter": "16px",
                "base": "8px",
                "stack-md": "24px",
                "margin-mobile": "16px",
                "margin-desktop": "32px"
        },
        "fontFamily": {
                "label-lg": ["Inter"],
                "headline-lg-mobile": ["Inter"],
                "headline-lg": ["Inter"],
                "body-lg": ["Inter"],
                "cta": ["Inter"],
                "headline-md": ["Inter"],
                "body-md": ["Inter"]
        },
        "fontSize": {
                "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "700"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "cta": ["18px", {"lineHeight": "24px", "fontWeight": "700"}],
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

<style>
  body {
    -webkit-tap-highlight-color: transparent;
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant/20 flex items-center justify-between px-margin-mobile h-touch-target-min z-50">
<button aria-label="Bumalik" class="text-on-surface-variant hover:bg-surface-container active:scale-95 transition-transform flex items-center justify-center h-10 w-10 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary truncate mx-4 flex-1 text-center">PegaBao</h1>
<!-- Invisible placeholder to balance the back button -->
<div class="h-10 w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile py-stack-md max-w-md mx-auto w-full md:max-w-2xl md:px-margin-desktop md:py-margin-desktop">
<!-- Progress Indicator -->
<div class="mb-stack-md">
<div class="flex justify-between items-center mb-base">
<span class="font-label-lg text-label-lg text-primary">Hakbang 3 ng 3</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Preferences</span>
</div>
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-in-out" style="width: 100%;"></div>
</div>
</div>
<!-- Success Illustration / Icon -->
<div class="flex flex-col items-center justify-center my-stack-md md:my-margin-desktop animate-fade-in-up">
<div class="w-32 h-32 md:w-40 md:h-40 bg-primary-container rounded-full flex items-center justify-center mb-stack-md shadow-sm relative">
<span class="material-symbols-outlined text-primary text-[64px] md:text-[80px]" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
<div class="absolute -bottom-2 -right-2 w-12 h-12 bg-secondary-container rounded-full flex items-center justify-center border-4 border-surface">
<span class="material-symbols-outlined text-on-secondary-container text-2xl" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Typography -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface text-center mb-base">Handa ka na!</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[280px] md:max-w-md">
        Kakaunti na lang at maaari mo na kaming simulan. I-set ang iyong preferences sa ibaba para sa mas magandang karanasan.
      </p>
</div>
<!-- Preferences Checklist -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl p-gutter shadow-sm mb-stack-md md:mb-margin-desktop">
<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-sm text-lg">Mga Kagustuhan (Preferences)</h3>
<div class="flex flex-col gap-base">
<!-- Preference 1 -->
<label class="flex items-center gap-gutter p-base hover:bg-surface-container-low rounded-lg transition-colors cursor-pointer min-h-touch-target-min group">
<div class="relative flex items-center justify-center">
<input checked="" class="peer h-6 w-6 cursor-pointer appearance-none rounded-md border-2 border-outline checked:border-primary checked:bg-primary transition-all focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface bg-surface-container-lowest" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary opacity-0 peer-checked:opacity-100 pointer-events-none text-lg transition-opacity">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface group-active:text-primary transition-colors flex-1 select-none">
            Gusto kong makatanggap ng alerts para sa mga promo at diskwento.
          </span>
</label>
<hr class="border-t border-outline-variant/20"/>
<!-- Preference 2 -->
<label class="flex items-center gap-gutter p-base hover:bg-surface-container-low rounded-lg transition-colors cursor-pointer min-h-touch-target-min group">
<div class="relative flex items-center justify-center">
<input checked="" class="peer h-6 w-6 cursor-pointer appearance-none rounded-md border-2 border-outline checked:border-primary checked:bg-primary transition-all focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface bg-surface-container-lowest" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary opacity-0 peer-checked:opacity-100 pointer-events-none text-lg transition-opacity">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface group-active:text-primary transition-colors flex-1 select-none">
            I-save ang aking default na address para sa mas mabilis na booking.
          </span>
</label>
</div>
</div>
<!-- Spacer to push button to bottom on mobile if screen is tall enough, else just normal flow -->
<div class="flex-1"></div>
<!-- Final Action -->
<div class="mt-stack-md md:mt-0 pb-safe">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-cta text-cta rounded-full shadow-sm hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        Simulan ang Paghahanap
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
<p class="font-label-lg text-label-lg text-on-surface-variant text-center mt-stack-sm text-xs opacity-80">
        Sa pagpapatuloy, sumasang-ayon ka sa aming Mga Tuntunin at Patakaran.
      </p>
</div>
</main>
<style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    
    /* Support for safe area spacing on mobile devices */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    }
  </style>
</body></html>
