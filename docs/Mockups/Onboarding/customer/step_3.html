<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>PegaBao - Magsimula Bilang Customer</title>

                        "secondary": "#875300",

                        "safe-bottom": "env(safe-area-inset-bottom, 20px)"

                    "fontFamily": {

<style>
        /* Custom utilities for smooth rendering */
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col relative pb-32 selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Minimal App Bar for Onboarding (Suppressed standard nav per rules) -->
<header class="flex items-center h-16 px-margin-mobile w-full max-w-md mx-auto pt-4 shrink-0">
<button aria-label="Go back" class="w-touch-target-min h-touch-target-min -ml-2 flex items-center justify-center rounded-full hover:bg-surface-variant/50 active:bg-surface-variant transition-colors text-on-surface" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile w-full max-w-md mx-auto flex flex-col pt-stack-sm">
<!-- Header Section -->
<div class="mb-stack-md">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Magsimula Bilang Customer</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Lumikha ng account upang makahanap ng mga mapagkakatiwalaang propesyonal sa iyong komunidad.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-stack-sm" onsubmit="event.preventDefault();">
<!-- Full Name Input -->
<div class="flex flex-col gap-base">
<label class="font-label-lg text-label-lg text-on-surface" for="fullName">Buong Pangalan</label>
<input class="h-[56px] w-full px-4 rounded-lg border-2 border-outline-variant bg-surface text-on-surface font-body-lg text-body-lg placeholder:text-on-surface-variant/40 focus:border-secondary focus:ring-0 transition-colors shadow-sm" id="fullName" placeholder="Juan Dela Cruz" required="" type="text"/>
</div>
<!-- Phone Number Input -->
<div class="flex flex-col gap-base">
<label class="font-label-lg text-label-lg text-on-surface" for="phone">Numero ng Telepono</label>
<div class="flex h-[56px] w-full rounded-lg border-2 border-outline-variant bg-surface focus-within:border-secondary transition-colors shadow-sm overflow-hidden group">
<div class="flex items-center px-4 bg-surface-container-low border-r-2 border-outline-variant group-focus-within:border-secondary transition-colors">
<span class="font-body-lg text-body-lg text-on-surface">+63</span>
</div>
<input class="flex-1 h-full px-4 border-none bg-transparent text-on-surface font-body-lg text-body-lg placeholder:text-on-surface-variant/40 focus:ring-0" id="phone" pattern="[0-9]{10}" placeholder="912 345 6789" required="" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<div class="relative h-[56px] w-full">
<input class="h-full w-full pl-4 pr-14 rounded-lg border-2 border-outline-variant bg-surface text-on-surface font-body-lg text-body-lg placeholder:text-on-surface-variant/40 focus:border-secondary focus:ring-0 transition-colors shadow-sm" id="password" minlength="8" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-on-surface rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-secondary/50" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">visibility_off</span>
</button>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-1">Dapat hindi bababa sa 8 character.</p>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 my-stack-sm">
<div class="flex-1 h-px bg-outline-variant/50"></div>
<span class="font-label-lg text-label-lg text-on-surface-variant">o magpatuloy gamit ang</span>
<div class="flex-1 h-px bg-outline-variant/50"></div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-gutter mb-stack-md">
<button class="h-[56px] flex items-center justify-center gap-2 rounded-lg border-2 border-outline-variant bg-surface hover:bg-surface-container-low active:bg-surface-container transition-colors text-on-surface font-label-lg text-label-lg shadow-sm" type="button">
<svg class="w-6 h-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="h-[56px] flex items-center justify-center gap-2 rounded-lg border-2 border-outline-variant bg-surface hover:bg-surface-container-low active:bg-surface-container transition-colors text-on-surface font-label-lg text-label-lg shadow-sm" type="button">
<svg class="w-6 h-6" fill="#1877F2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
                    Facebook
                </button>
</div>
</form>
</main>
<!-- Sticky Footer Container for Primary Action -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/95 backdrop-blur-sm border-t border-outline-variant/20 z-50 px-margin-mobile pt-stack-sm pb-[calc(12px+env(safe-area-inset-bottom,20px))]">
<div class="max-w-md mx-auto w-full">
<button class="w-full h-[56px] flex items-center justify-center gap-2 rounded-lg bg-primary text-on-primary font-cta text-cta hover:bg-primary/90 active:scale-[0.98] transition-all shadow-sm" type="button">
                Susunod
                <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 700;">arrow_forward</span>
</button>
</div>
</footer>
<!-- Simple interaction script for password toggle -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');

            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                icon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            });
        });
    </script>
</body></html>
